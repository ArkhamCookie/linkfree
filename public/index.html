<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>LinkFree</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/theme.css">
</head>

<body>
    <header>
        <h1><a href="/">LinkFree</a></h1>

        <button id="theme-toggle-btn" aria-label="theme toggle button">
            <svg aria-label="theme-toggle-icon" viewBox="0 0 32 32" width="24" height="24" fill="currentcolor">
                <circle cx="16" cy="16" r="14" fill="none" stroke="currentcolor" stroke-width="4"></circle>
                <path d="M 16 0 A 16 16 0 0 0 16 32 z">
                </path>
            </svg>
        </button>
    </header>

    <p id="about">
        A <a href="https://wikipedia.org/wiki/Open_source">free and open source</a> <a href="https://wikipedia.org/wiki/Linktree">Linktree</a> alternative.
        <br>
        To learn more, checkout the <a href="https://github.com/ArkhamCookie/linkfree">GitHub for this project</a>.
    </p>

    <a aria-label="link to get started" id="get-started" href="/public/app.html">
        Get Started!
        <div id="get-started-icon">
            <svg aria-label="get started arrow icon" id="get-started-svg" height="24" width="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 0h24v24H0z" fill="none"></path>
                <path d="M16.172 11l-5.364-5.364 1.414-1.414L20 12l-7.778 7.778-1.414-1.414L16.172 13H4v-2z" fill="currentColor"></path>
            </svg>
        </div>
    </a>

    <footer>
        <p>
            Created by <a href="https://arkhamcookie.com">ArkhamCookie</a>
            <br>
            Source code available on <a href="https://github.com/ArkhamCookie/linkfree">GitHub</a>
        </p>
    </footer>

    <script src="js/theme.js" type="module"></script>
</body>

</html>
